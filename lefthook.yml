output:
  - failure

# Skills are materialized by direnv (.envrc out-link), not git hooks.
pre-commit:
  parallel: true
  commands:
    nixfmt:
      glob: "*.nix"
      run: nixfmt --check {staged_files}
    statix:
      glob: "*.nix"
      run: statix check
    deadnix:
      glob: "*.nix"
      run: deadnix --fail {staged_files}
    shellcheck:
      glob: "**/*.sh"
      run: shellcheck {staged_files}
    nix-unit:
      glob: "nix/**/*.nix"
      run: nix-unit --flake .#tests

pre-push:
  parallel: true
  commands:
    nixfmt:
      glob: "*.nix"
      run: nixfmt --check {all_files}
    statix:
      glob: "*.nix"
      run: statix check
    deadnix:
      glob: "*.nix"
      run: deadnix --fail {all_files}
    shellcheck:
      glob: "**/*.sh"
      run: shellcheck {all_files}
    nix-unit:
      glob: "nix/**/*.nix"
      run: nix-unit --flake .#tests

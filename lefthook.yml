---
# PROTOTYPE of mkSetting.lefthook output -- remote hooks from nix-lefthook-*
# (per the lefthook skill: remotes preferred over inline). Bundles: base, nix,
# shell, markdown, yaml, ascii. Binaries come from set-and-setting's devShell
# (inputsFrom in nix/devshells.nix). Refs pinned to main for now (SHA later).
output:
  - failure

remotes:
  # base -- universal hygiene (self-wired: each remote brings its own command)
  - git_url: https://github.com/pr0d1r2/nix-lefthook-trailing-whitespace
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-missing-final-newline
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-git-conflict-markers
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-file-size-check
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-execute-permissions
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-gitleaks
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-typos
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-editorconfig-checker
    ref: main
    configs: [lefthook-remote.yml]
  # nix
  - git_url: https://github.com/pr0d1r2/nix-lefthook-nixfmt
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-statix
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-deadnix
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-nix-no-embedded-shell
    ref: main
    configs: [lefthook-remote.yml]
  # shell
  - git_url: https://github.com/pr0d1r2/nix-lefthook-shellcheck
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-shfmt
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-no-shell-functions
    ref: main
    configs: [lefthook-remote.yml]
  # explicitly-wired remotes (commands below need project glob/exclude/env)
  - git_url: https://github.com/pr0d1r2/nix-lefthook-ascii-only
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-git-no-local-paths
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-markdownlint
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-markdownlint-agentic
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-yamllint
    ref: main
    configs: [lefthook-remote.yml]
  - git_url: https://github.com/pr0d1r2/nix-lefthook-nix-flake-eval
    ref: main
    configs: [lefthook-remote.yml]

pre-commit:
  parallel: true
  commands:
    ascii-only:
      glob: "*.{nix,yml,json}"
      run: timeout ${LEFTHOOK_ASCII_ONLY_TIMEOUT:-30} lefthook-ascii-only {staged_files}
    git-no-local-paths:
      exclude: "^flake\\.(nix|lock)$"
      run: timeout ${LEFTHOOK_GIT_NO_LOCAL_PATHS_TIMEOUT:-30} lefthook-git-no-local-paths {staged_files}
    markdownlint:
      glob: "*.md"
      run: timeout ${LEFTHOOK_MARKDOWNLINT_TIMEOUT:-30} lefthook-markdownlint {staged_files}
    markdownlint-agentic:
      glob: "*.md"
      exclude: "^(README|CHANGELOG|SPEC|CONTRIBUTING)\\.md$"
      run: timeout ${LEFTHOOK_MARKDOWNLINT_AGENTIC_TIMEOUT:-30} lefthook-markdownlint-agentic {staged_files}
    yamllint:
      glob: "*.{yml,yaml}"
      run: timeout ${LEFTHOOK_YAMLLINT_TIMEOUT:-30} lefthook-yamllint {staged_files}
    nix-flake-eval:
      glob: "*.nix"
      env:
        LEFTHOOK_NIX_FLAKE_EVAL_ATTR: ".#lib"
      run: timeout ${LEFTHOOK_NIX_FLAKE_EVAL_TIMEOUT:-60} lefthook-nix-flake-eval
    # project-specific (not covered by any remote)
    nix-unit:
      glob: "nix/**/*.nix"
      run: nix-unit --flake .#tests
    setting-drift:
      glob: "{.editorconfig,.gitattributes,.gitignore}"
      run: nix build .#setting-drift --no-link

pre-push:
  parallel: true
  commands:
    ascii-only:
      glob: "*.{nix,yml,json}"
      run: timeout ${LEFTHOOK_ASCII_ONLY_TIMEOUT:-30} lefthook-ascii-only {push_files}
    git-no-local-paths:
      exclude: "^flake\\.(nix|lock)$"
      run: timeout ${LEFTHOOK_GIT_NO_LOCAL_PATHS_TIMEOUT:-30} lefthook-git-no-local-paths {push_files}
    markdownlint:
      glob: "*.md"
      run: timeout ${LEFTHOOK_MARKDOWNLINT_TIMEOUT:-30} lefthook-markdownlint {push_files}
    markdownlint-agentic:
      glob: "*.md"
      exclude: "^(README|CHANGELOG|SPEC|CONTRIBUTING)\\.md$"
      run: timeout ${LEFTHOOK_MARKDOWNLINT_AGENTIC_TIMEOUT:-30} lefthook-markdownlint-agentic {push_files}
    yamllint:
      glob: "*.{yml,yaml}"
      run: timeout ${LEFTHOOK_YAMLLINT_TIMEOUT:-30} lefthook-yamllint {push_files}
    nix-flake-eval:
      glob: "*.nix"
      env:
        LEFTHOOK_NIX_FLAKE_EVAL_ATTR: ".#lib"
      run: timeout ${LEFTHOOK_NIX_FLAKE_EVAL_TIMEOUT:-60} lefthook-nix-flake-eval
    nix-unit:
      glob: "nix/**/*.nix"
      run: nix-unit --flake .#tests
    setting-drift:
      run: nix build .#setting-drift --no-link

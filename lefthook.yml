output:
  - failure

# Skill set is materialized on git events, not shell entry — keeps .claude/
# fresh after checkout/merge without copying on every `nix develop`.
post-checkout:
  commands:
    sync-skills:
      run: nix run .#skills

post-merge:
  commands:
    sync-skills:
      run: nix run .#skills

pre-commit:
  parallel: true
  commands:
    nixfmt:
      glob: "*.nix"
      run: nixfmt --check {staged_files}
    statix:
      glob: "*.nix"
      run: statix check
    deadnix:
      glob: "*.nix"
      run: deadnix --fail {staged_files}
    shellcheck:
      glob: "**/*.sh"
      run: shellcheck {staged_files}
    nix-unit:
      glob: "{lib,tests,nix}/**/*.nix"
      run: nix-unit --flake .#tests

pre-push:
  parallel: true
  commands:
    nixfmt:
      glob: "*.nix"
      run: nixfmt --check {all_files}
    statix:
      glob: "*.nix"
      run: statix check
    deadnix:
      glob: "*.nix"
      run: deadnix --fail {all_files}
    shellcheck:
      glob: "**/*.sh"
      run: shellcheck {all_files}
    nix-unit:
      glob: "{lib,tests,nix}/**/*.nix"
      run: nix-unit --flake .#tests
